<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CutMy 订单管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span {
      background: #2c3e50;
      color: white;
      font-size: 14px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .refresh-btn {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .refresh-btn:hover {
      background: #1a252f;
    }

    .stats {
      color: #666;
      font-size: 14px;
    }

    .order-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border: 1px solid #e0e0e0;
    }

    .order-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }

    .order-id {
      font-weight: 700;
      color: #2c3e50;
      font-family: monospace;
      font-size: 15px;
    }

    .order-status {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .status-未收 {
      background: #FEF3C7;
      color: #92400E;
    }

    .status-部分 {
      background: #DBEAFE;
      color: #1E40AF;
    }

    .status-已收 {
      background: #D1FAE5;
      color: #065F46;
    }

    .status-完成 {
      background: #2c3e50;
      color: white;
    }

    .order-date {
      margin-left: auto;
      font-size: 13px;
      color: #888;
    }

    .order-body {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px 16px;
    }

    .order-item {
      display: flex;
      font-size: 14px;
    }

    .order-label {
      color: #888;
      width: 75px;
      flex-shrink: 0;
    }

    .order-value {
      color: #333;
      font-weight: 500;
    }

    .order-value.highlight {
      color: #c0392b;
      font-weight: 700;
      font-size: 16px;
    }

    .order-note {
      grid-column: span 2;
      background: #f9f9f9;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-edit {
      background: #3B82F6;
      color: white;
    }

    .btn-edit:hover {
      background: #2563EB;
    }

    .btn-delete {
      background: #DC2626;
      color: white;
    }

    .btn-delete:hover {
      background: #B91C1C;
    }

    .btn-save {
      background: #10B981;
      color: white;
    }

    .btn-save:hover {
      background: #059669;
    }

    .btn-cancel {
      background: #9CA3AF;
      color: white;
    }

    .btn-cancel:hover {
      background: #6B7280;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #999;
    }

    .empty {
      text-align: center;
      padding: 60px;
      color: #999;
      background: white;
      border-radius: 12px;
    }

    /* 编辑弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 550px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3B82F6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-actions .btn {
      flex: 1;
      padding: 12px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c3e50;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 2000;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: #DC2626;
    }
  </style>
</head>

<body>

  <h1>
    🌿 CutMy 订单管理
    <span id="total-badge">0 条</span>
  </h1>

  <div class="toolbar">
    <div class="stats" id="stats">加载中...</div>
    <button class="refresh-btn" onclick="loadOrders()">🔄 刷新数据</button>
  </div>

  <div id="order-list" class="order-list">
    <div class="loading">加载中...</div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal" id="editModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <h3>✏️ 编辑订单</h3>
      <form id="editForm" onsubmit="saveEdit(event)">
        <input type="hidden" id="edit-id" />

        <div class="form-row">
          <div class="form-group">
            <label>客户名称 *</label>
            <input type="text" id="edit-client" required />
          </div>
          <div class="form-group">
            <label>联系方式</label>
            <input type="text" id="edit-contact" />
          </div>
        </div>

        <div class="form-group">
          <label>具体要求</label>
          <textarea id="edit-req" rows="2"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>总金额 *</label>
            <input type="number" id="edit-total" step="0.01" required />
          </div>
          <div class="form-group">
            <label>已收金额</label>
            <input type="number" id="edit-paid" step="0.01" value="0" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>款项状态</label>
            <select id="edit-paidStatus">
              <option value="未收">未收</option>
              <option value="部分">部分</option>
              <option value="已收">已收</option>
              <option value="完成">完成</option>
            </select>
          </div>
          <div class="form-group">
            <label>生产文件</label>
            <select id="edit-prodStatus">
              <option value="未完成">未完成</option>
              <option value="完成">完成</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>板材情况</label>
          <input type="text" id="edit-board" />
        </div>

        <div class="form-group">
          <label>地址</label>
          <input type="text" id="edit-address" />
        </div>

        <div class="form-group">
          <label>备注</label>
          <textarea id="edit-note" rows="2"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>开单时间 *</label>
            <input type="date" id="edit-date" required />
          </div>
          <div class="form-group">
            <label>交货时间</label>
            <input type="date" id="edit-delivery" />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-save">💾 保存修改</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let orders = [];

    // ========== 加载订单 ==========
    async function loadOrders() {
      const listEl = document.getElementById('order-list');
      listEl.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch('/.netlify/functions/getRecords');
        const data = await response.json();
        orders = data || [];
        renderOrders();
        showToast(`已加载 ${orders.length} 条记录`);
      } catch (error) {
        console.error('加载失败:', error);
        listEl.innerHTML = '<div class="empty" style="color:#DC2626;">❌ 加载失败，请刷新重试</div>';
        document.getElementById('stats').textContent = '连接失败';
        document.getElementById('total-badge').textContent = '0 条';
      }
    }

    // ========== 渲染订单 ==========
    function renderOrders() {
      const listEl = document.getElementById('order-list');

      if (orders.length === 0) {
        listEl.innerHTML = '<div class="empty">📭 暂无订单记录</div>';
        document.getElementById('stats').textContent = '暂无数据';
        document.getElementById('total-badge').textContent = '0 条';
        return;
      }

      // 统计数据
      const totalAmount = orders.reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
      const totalPaid = orders.reduce((sum, o) => sum + (parseFloat(o.paid) || 0), 0);

      document.getElementById('stats').textContent =
        `总金额 ¥${totalAmount.toFixed(2)}  |  已收 ¥${totalPaid.toFixed(2)}`;
      document.getElementById('total-badge').textContent = `${orders.length} 条`;

      // 按日期倒序排列
      const sortedOrders = [...orders].sort((a, b) => {
        return (b.date || '').localeCompare(a.date || '');
      });

      listEl.innerHTML = sortedOrders.map(order => {
        const status = order.paidStatus || '未收';

        return `
      <div class="order-card">
        <div class="order-header">
          <span class="order-id">#${order.id}</span>
          <span class="order-status status-${status}">${status}</span>
          <span class="order-date">${order.date || '—'}</span>
        </div>
        <div class="order-body">
          <div class="order-item">
            <span class="order-label">客户</span>
            <span class="order-value">${order.client || '—'}${order.contact ? ' · ' + order.contact : ''}</span>
          </div>
          <div class="order-item">
            <span class="order-label">板材</span>
            <span class="order-value">${order.board || '—'}</span>
          </div>
          <div class="order-item">
            <span class="order-label">总金额</span>
            <span class="order-value highlight">¥${order.total || 0}</span>
          </div>
          <div class="order-item">
            <span class="order-label">已收</span>
            <span class="order-value">¥${order.paid || 0}</span>
          </div>
          <div class="order-item">
            <span class="order-label">生产文件</span>
            <span class="order-value">${order.prodStatus || '未完成'}</span>
          </div>
          <div class="order-item">
            <span class="order-label">交货</span>
            <span class="order-value">${order.delivery || '待定'}</span>
          </div>
          ${order.req ? `
          <div class="order-item" style="grid-column: span 2;">
            <span class="order-label">要求</span>
            <span class="order-value">${order.req}</span>
          </div>` : ''}
          ${order.note ? `
          <div class="order-note">📌 ${order.note}</div>` : ''}
        </div>
        <div class="order-actions">
          <button class="btn btn-edit" onclick="openEdit(${order.id})">✏️ 编辑</button>
          <button class="btn btn-delete" onclick="deleteOrder(${order.id})">🗑️ 删除</button>
        </div>
      </div>
    `;
      }).join('');
    }

    // ========== 打开编辑弹窗 ==========
    function openEdit(id) {
      const order = orders.find(o => o.id === id);
      if (!order) return;

      document.getElementById('edit-id').value = id;
      document.getElementById('edit-client').value = order.client || '';
      document.getElementById('edit-contact').value = order.contact || '';
      document.getElementById('edit-req').value = order.req || '';
      document.getElementById('edit-total').value = order.total || 0;
      document.getElementById('edit-paid').value = order.paid || 0;
      document.getElementById('edit-paidStatus').value = order.paidStatus || '未收';
      document.getElementById('edit-prodStatus').value = order.prodStatus || '未完成';
      document.getElementById('edit-board').value = order.board || '';
      document.getElementById('edit-address').value = order.address || '';
      document.getElementById('edit-note').value = order.note || '';
      document.getElementById('edit-date').value = order.date || '';
      document.getElementById('edit-delivery').value = order.delivery || '';

      document.getElementById('editModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('show');
    }

    // ========== 保存编辑 ==========
    async function saveEdit(e) {
      e.preventDefault();

      const formData = {
        id: document.getElementById('edit-id').value,
        client: document.getElementById('edit-client').value,
        contact: document.getElementById('edit-contact').value,
        req: document.getElementById('edit-req').value,
        total: document.getElementById('edit-total').value,
        paid: document.getElementById('edit-paid').value,
        paidStatus: document.getElementById('edit-paidStatus').value,
        prodStatus: document.getElementById('edit-prodStatus').value,
        board: document.getElementById('edit-board').value,
        address: document.getElementById('edit-address').value,
        note: document.getElementById('edit-note').value,
        date: document.getElementById('edit-date').value,
        delivery: document.getElementById('edit-delivery').value
      };

      showToast('保存中...');

      try {
        const response = await fetch('/.netlify/functions/updateRecord', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const result = await response.json();

        if (result.success) {
          showToast('✅ 保存成功');
          closeModal();
          loadOrders();
        } else {
          showToast('❌ 保存失败: ' + (result.error || '未知错误'), 'error');
        }
      } catch (error) {
        console.error('保存失败:', error);
        showToast('❌ 网络错误', 'error');
      }
    }

    // ========== 删除订单 ==========
    async function deleteOrder(id) {
      if (!confirm('确定要删除这条订单吗？此操作不可撤销。')) return;

      showToast('删除中...');

      try {
        const response = await fetch('/.netlify/functions/deleteRecord', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        const result = await response.json();

        if (result.success) {
          showToast('✅ 删除成功');
          loadOrders();
        } else {
          showToast('❌ 删除失败: ' + (result.error || '未知错误'), 'error');
        }
      } catch (error) {
        console.error('删除失败:', error);
        showToast('❌ 网络错误', 'error');
      }
    }

    // ========== 提示 ==========
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast' + (type ? ' ' + type : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // 初始化
    loadOrders();
    setInterval(loadOrders, 30000);
  </script>
</body>

</html>
